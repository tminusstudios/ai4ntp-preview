<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 320" width="240" height="320">
  <style>
    .stacked { font-family: 'Fraunces', 'Times New Roman', serif; font-weight: 900; font-size: 110px; letter-spacing: -0.04em; }
    .stacked-four { font-style: italic; }
  </style>
  <!-- ai -->
  <text x="120" y="100" text-anchor="middle" class="stacked" fill="#0F1113">ai</text>
  <!-- signal bar behind 4 -->
  <rect x="70" y="118" width="100" height="100" fill="#D4FF3A"/>
  <text x="120" y="202" text-anchor="middle" class="stacked stacked-four" fill="#0F1113">4</text>
  <!-- ntp -->
  <text x="120" y="304" text-anchor="middle" class="stacked" fill="#0F1113">ntp</text>
</svg>
