<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Your referral portal · AI4NTP</title>
<meta name="description" content="Track your AI4NTP referrals and unlock rewards.">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-4YY783506Y"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

<link rel="icon" href="/ai4ntp-preview/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/ai4ntp-preview/logo-monogram.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=JetBrains+Mono:wght@400;500;700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --ink:#0E1116; --ink-2:#12161D; --surface:#171D26; --surface-2:#1F2733;
    --line:#2A323F; --line-2:#384252; --text:#EDEBE6; --text-2:#A7B0BD; --muted:#8A93A1;
    --signal:#F5B133; --signal-d:#C98A1E; --teal:#4FD6C4; --teal-d:#2E9E90; --red:#FF6B6B;
    --sans:"Hanken Grotesk", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --serif:"Fraunces", Georgia, serif;
    --mono:"JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --maxw:820px;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--ink); color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased; }
  a { color:inherit; }
  ::selection { background:var(--signal); color:#1c1405; }
  .wrap { max-width:var(--maxw); margin:0 auto; padding:0 clamp(18px,5vw,32px); }

  .topbar { position:sticky; top:0; z-index:20; background:rgba(14,17,22,.85); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); }
  .topbar .wrap { display:flex; align-items:center; justify-content:space-between; height:56px; }
  .logo { font-family:var(--serif); font-weight:600; font-size:20px; letter-spacing:-.01em; }
  .logo .four { color:var(--signal); }
  .topbar .home { font-family:var(--mono); font-size:12px; color:var(--text-2); text-decoration:none; }
  .topbar .home:hover { color:var(--text); }

  main { padding:clamp(34px,7vw,64px) 0 96px; }
  .eyebrow { font-family:var(--mono); font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--signal); margin:0 0 12px; }
  .eyebrow::before { content:"// "; color:var(--signal-d); font-weight:700; }
  h1 { font-family:var(--serif); font-weight:500; font-size:clamp(2rem,6vw,3rem); line-height:1.05; margin:0 0 10px; }
  .sub { color:var(--text-2); font-size:1.05rem; margin:0 0 34px; }

  .card { background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:clamp(18px,4vw,26px); margin-bottom:18px; }
  .card-k { font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin:0 0 12px; }

  /* link card */
  .linkrow { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .linkbox { flex:1 1 240px; min-width:0; font-family:var(--mono); font-size:14px; padding:13px 14px; border:1px solid var(--line-2); border-radius:10px; background:var(--ink-2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .btn { cursor:pointer; border:0; border-radius:10px; padding:13px 20px; font-weight:700; font-size:.95rem; font-family:var(--sans); background:var(--teal); color:#062019; }
  .btn:active { transform:translateY(1px); }
  .btn.ghost { background:transparent; color:var(--text); border:1px solid var(--line-2); }
  .share { display:flex; gap:16px; margin-top:14px; font-size:13px; font-family:var(--mono); }
  .share a { color:var(--text-2); text-decoration:none; }
  .share a:hover { color:var(--teal); }

  /* stat row */
  .stats { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:18px; }
  .stat { background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:22px; }
  .stat .n { font-family:var(--serif); font-size:clamp(2.4rem,8vw,3.4rem); line-height:1; }
  .stat .l { color:var(--text-2); font-size:.9rem; margin-top:6px; }
  .stat .teal { color:var(--teal); }

  /* progress */
  .prog-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  .prog-top .goal { font-weight:700; }
  .prog-top .away { font-family:var(--mono); font-size:12px; color:var(--signal); }
  .track { height:12px; border-radius:99px; background:var(--ink-2); border:1px solid var(--line); overflow:hidden; }
  .fill { height:100%; background:linear-gradient(90deg, var(--teal-d), var(--teal)); border-radius:99px; transition:width .6s cubic-bezier(.2,.7,.2,1); }

  /* milestones */
  .ms { display:grid; gap:12px; }
  .m { display:flex; align-items:center; gap:16px; padding:16px; border:1px solid var(--line); border-radius:14px; background:var(--ink-2); }
  .m .badge { flex:0 0 auto; width:46px; height:46px; border-radius:12px; display:grid; place-items:center; font-family:var(--serif); font-size:20px; background:var(--surface-2); border:1px solid var(--line-2); }
  .m.on .badge { background:var(--teal); color:#062019; border-color:var(--teal); }
  .m .body { flex:1 1 auto; min-width:0; }
  .m .t { font-weight:700; }
  .m .d { color:var(--text-2); font-size:.9rem; margin-top:2px; }
  .m .state { font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
  .m.on .state { color:var(--teal); }
  .m .claim { margin-top:10px; }
  .claim-btn { display:inline-block; background:var(--signal); color:#1c1405; font-weight:700; padding:11px 18px; border-radius:10px; text-decoration:none; font-size:.92rem; }
  .claim-btn:hover { background:#ffc24d; }

  /* referred list */
  .rl { list-style:none; margin:0; padding:0; }
  .rl li { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px 2px; border-bottom:1px solid var(--line); }
  .rl li:last-child { border-bottom:0; }
  .rl .who-cell { display:flex; flex-direction:column; min-width:0; flex:1 1 auto; }
  .rl .who { font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rl .who-sub { font-size:12px; color:var(--muted); margin-top:2px; }
  .rl .when { font-family:var(--mono); font-size:12px; color:var(--muted); flex:0 0 auto; }
  .pill { font-family:var(--mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; padding:4px 9px; border-radius:99px; border:1px solid var(--line-2); color:var(--text-2); }
  .pill.attended { color:var(--teal); border-color:var(--teal-d); }
  .pill.rewarded { color:var(--signal); border-color:var(--signal-d); }
  .empty { color:var(--muted); font-size:.95rem; padding:8px 0; }

  .msg { text-align:center; padding:80px 0; }
  .msg h1 { font-size:1.6rem; }
  .msg p { color:var(--text-2); }
  .hidden { display:none; }
</style>
</head>
<body>

<div class="topbar">
  <div class="wrap">
    <a class="logo" href="/ai4ntp-preview/">ai<span class="four">4</span>ntp</a>
    <a class="home" href="/ai4ntp-preview/">ai4ntp.com &#8599;</a>
  </div>
</div>

<main>
  <div class="wrap" id="app">
    <div class="msg"><h1>Loading your portal&hellip;</h1></div>
  </div>
</main>

<script>
(function () {
  var app = document.getElementById('app');
  var params = new URLSearchParams(window.location.search);
  var token = (params.get('t') || '').trim();

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  function fmtDate(iso){ try{ return new Date(iso).toLocaleDateString(undefined,{month:'short',day:'numeric'}); }catch(e){ return ''; } }

  function msg(title, body){
    app.innerHTML = '<div class="msg"><h1>'+esc(title)+'</h1>'+(body?'<p>'+esc(body)+'</p>':'')+'</div>';
  }

  if (!token) { msg('This link looks incomplete', 'Open your portal from the link we gave you when you got your referral code.'); return; }

  var SHARE_TEXT = 'Join me at a free live AI4NTP session. Grab your seat with my link:';

  // Rewards stay hidden until a tier unlocks (attendance-confirmed). Only tier 1 (Insider)
  // has a concrete reward wired so far; the rest reveal a "we will be in touch" note.
  var REWARDS = {
    3: { line: 'Your reward: a free 30-minute live build session, on us.',
         claim: '<a class="claim-btn" href="/ai4ntp-preview/build" data-cta="portal_claim_build">Claim it &#8594;</a>' }
  };

  function milestoneCard(t, count){
    var unlocked = t.unlocked, reached = t.signups_reached, rev = REWARDS[t.threshold];
    var state = unlocked ? 'Unlocked' : (reached ? 'Unlocks on attendance' : count + ' / ' + t.threshold);
    var body = '<div class="t">'+esc(t.name)+'</div>';
    if (unlocked) {
      body += '<div class="d">'+ (rev ? esc(rev.line) : 'Reward unlocked. We will be in touch with the details.') +'</div>';
      if (rev && rev.claim) body += '<div class="claim">'+rev.claim+'</div>';
    } else {
      body += '<div class="d">Reward revealed when you unlock this tier.</div>';
    }
    return '<div class="m'+(unlocked?' on':'')+'">' +
      '<div class="badge">'+(unlocked?'&#10003;':t.threshold)+'</div>' +
      '<div class="body">'+body+'</div>' +
      '<div class="state">'+esc(state)+'</div></div>';
  }

  function render(d){
    var name = d.first_name ? (', ' + d.first_name) : '';
    var count = d.referred_count;
    var next = d.milestones.next;
    var nextName = d.milestones.next_name;
    var pct = next ? Math.min(100, Math.round(count / next * 100)) : 100;
    var away = next ? (d.milestones.remaining + ' more to ' + nextName) : 'All tiers reached';

    var link = d.share_link;
    var body = SHARE_TEXT + '\n\n' + link;

    var refList = d.referrals.length
      ? '<ul class="rl">' + d.referrals.map(function(r){
          var st = r.status === 'attended' ? 'attended' : (r.status === 'rewarded' ? 'rewarded' : 'pending');
          var primary = r.email || r.first_name || 'A friend';
          var sub = (r.email && r.first_name) ? r.first_name : '';
          return '<li><span class="who-cell">' +
                   '<span class="who" title="'+esc(primary)+'">'+esc(primary)+'</span>' +
                   (sub ? '<span class="who-sub">'+esc(sub)+'</span>' : '') +
                 '</span>' +
                 '<span class="when">'+esc(fmtDate(r.date))+'</span>' +
                 '<span class="pill '+st+'">'+esc(st)+'</span></li>';
        }).join('') + '</ul>'
      : '<div class="empty">No referrals yet. Share your link to get started.</div>';

    app.innerHTML =
      '<p class="eyebrow">Referral portal</p>' +
      '<h1>Your referrals'+esc(name)+'.</h1>' +
      '<p class="sub">Every friend who signs up through your link shows up here. Unlock exclusive rewards as they attend, from Insider to Legend.</p>' +

      '<div class="card"><p class="card-k">Your link</p>' +
        '<div class="linkrow">' +
          '<div class="linkbox" title="'+esc(link)+'">'+esc(link)+'</div>' +
          '<button class="btn js-copy" type="button">Copy link</button>' +
        '</div>' +
        '<div class="share">' +
          '<a href="mailto:?subject='+encodeURIComponent('A free live AI4NTP session')+'&body='+encodeURIComponent(body)+'" data-cta="portal_share_email">Email</a>' +
          '<a target="_blank" rel="noopener" href="https://www.linkedin.com/sharing/share-offsite/?url='+encodeURIComponent(link)+'" data-cta="portal_share_linkedin">LinkedIn</a>' +
          '<a target="_blank" rel="noopener" href="https://twitter.com/intent/tweet?text='+encodeURIComponent(SHARE_TEXT)+'&url='+encodeURIComponent(link)+'" data-cta="portal_share_x">X</a>' +
        '</div>' +
      '</div>' +

      '<div class="stats">' +
        '<div class="stat"><div class="n teal">'+count+'</div><div class="l">Friends signed up</div></div>' +
        '<div class="stat"><div class="n">'+d.clicks+'</div><div class="l">Link clicks</div></div>' +
      '</div>' +

      '<div class="card">' +
        '<div class="prog-top"><span class="goal">'+ (nextName ? ('Next: '+esc(nextName)) : 'All tiers reached') +'</span><span class="away">'+esc(away)+'</span></div>' +
        '<div class="track"><div class="fill" style="width:'+pct+'%"></div></div>' +
      '</div>' +

      '<div class="card"><p class="card-k">Tiers</p><div class="ms">' +
        (d.milestones.tiers||[]).map(function(t){ return milestoneCard(t, count); }).join('') +
      '</div></div>' +

      '<div class="card"><p class="card-k">Who you referred</p>'+refList+'</div>';

    // copy handler
    var copyBtn = app.querySelector('.js-copy');
    if (copyBtn) copyBtn.addEventListener('click', function(){
      var done = function(){ var t=copyBtn.textContent; copyBtn.textContent='Copied'; setTimeout(function(){copyBtn.textContent=t;},1600); };
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(link).then(done,done);
      else { var ta=document.createElement('textarea'); ta.value=link; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(e){} document.body.removeChild(ta); done(); }
      if (typeof gtag==='function') gtag('event','portal_copy_link');
    });

    var insiderUnlocked = (d.milestones.tiers||[]).some(function(t){ return t.threshold===3 && t.unlocked; });
    if (insiderUnlocked && typeof gtag==='function') gtag('event','portal_tier_unlock_view');
  }

  function load(){
    fetch('/api/portal-stats?t='+encodeURIComponent(token))
      .then(function(r){
        if (r.status === 404) { msg('We could not find that portal', 'Double-check your link, or grab a fresh one at ai4ntp.com/refer.'); return null; }
        if (!r.ok) throw new Error('status '+r.status);
        return r.json();
      })
      .then(function(d){ if (d) render(d); })
      .catch(function(){ msg('Something went wrong', 'Please refresh in a moment.'); });
  }

  load();
  if (typeof gtag==='function') gtag('event','portal_view');
  // Live-ish: refresh periodically and when the tab regains focus.
  setInterval(function(){ if (!document.hidden) load(); }, 25000);
  document.addEventListener('visibilitychange', function(){ if (!document.hidden) load(); });
})();
</script>
</body>
</html>
